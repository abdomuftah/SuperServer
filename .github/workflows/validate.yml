name: Validate SuperServer

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: sudo apt-get update && sudo apt-get install -y shellcheck php-cli

      - name: Bash syntax
        run: |
          bash -n SuperServer.sh
          bash -n assets/apache_setup.sh
          bash -n assets/nginx_setup.sh
          bash -n assets/super-server.sh

      - name: ShellCheck errors
        run: |
          shellcheck -x --severity=error SuperServer.sh
          shellcheck --severity=error assets/apache_setup.sh assets/nginx_setup.sh assets/super-server.sh

      - name: ShellCheck warnings
        continue-on-error: true
        run: |
          shellcheck -x --severity=warning SuperServer.sh
          shellcheck --severity=warning assets/apache_setup.sh assets/nginx_setup.sh assets/super-server.sh

      - name: PHP syntax
        run: php -l assets/index.php

      - name: Project consistency
        run: python3 tests/validate.py
