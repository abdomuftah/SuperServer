    <g transform="translate(251 120)"><rect width="176" height="96" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="30" r="16" fill="#55cedd"/><text x="30" y="36" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">2</text><text x="22" y="67" font-size="16" font-weight="800" fill="#fff">Web server</text><text x="22" y="87" font-size="13" fill="#91a0bd">Apache or Nginx</text></g>
    <g transform="translate(448 120)"><rect width="176" height="96" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="30" r="16" fill="#5da9ff"/><text x="30" y="36" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">3</text><text x="22" y="67" font-size="16" font-weight="800" fill="#fff">PHP versions</text><text x="22" y="87" font-size="13" fill="#91a0bd">8.1 through 8.5</text></g>
    <g transform="translate(645 120)"><rect width="176" height="96" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="30" r="16" fill="#768fff"/><text x="30" y="36" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">4</text><text x="22" y="67" font-size="16" font-weight="800" fill="#fff">PHP modules</text><text x="22" y="87" font-size="13" fill="#91a0bd">Essential, all, custom</text></g>
    <g transform="translate(842 120)"><rect width="176" height="96" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="30" r="16" fill="#927dff"/><text x="30" y="36" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">5</text><text x="22" y="67" font-size="16" font-weight="800" fill="#fff">Components</text><text x="22" y="87" font-size="13" fill="#91a0bd">Database, cache, tools</text></g>
    <g transform="translate(1039 120)"><rect width="176" height="96" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="30" r="16" fill="#a985ff"/><text x="30" y="36" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">6</text><text x="22" y="67" font-size="16" font-weight="800" fill="#fff">Security</text><text x="22" y="87" font-size="13" fill="#91a0bd">CrowdSec options</text></g>
    <g transform="translate(842 250)"><rect width="176" height="82" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="28" r="16" fill="#927dff"/><text x="30" y="34" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">7</text><text x="22" y="63" font-size="16" font-weight="800" fill="#fff">Review plan</text></g>
