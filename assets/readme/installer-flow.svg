<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="370" viewBox="0 0 1280 370" role="img" aria-label="SuperServer installer flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#11182b"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#4de2d1"/><stop offset=".55" stop-color="#5da9ff"/><stop offset="1" stop-color="#a985ff"/></linearGradient>
  </defs>
  <rect width="1280" height="370" rx="28" fill="url(#bg)"/>
  <text x="54" y="55" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800" fill="#f4f7ff">Guided setup — all choices first, installation second</text>
  <text x="54" y="87" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#96a1bd">Review the complete plan before SuperServer changes the machine.</text>
  <path d="M105 168H1175M1175 168V276H105" fill="none" stroke="url(#line)" stroke-width="4" opacity=".55"/>
  <g font-family="Arial, Helvetica, sans-serif">
