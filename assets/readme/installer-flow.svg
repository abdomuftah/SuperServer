    <g transform="translate(251 250)"><rect width="176" height="82" rx="18" fill="#151d31" stroke="#ffffff20"/><circle cx="30" cy="28" r="16" fill="#55cedd"/><text x="30" y="34" text-anchor="middle" font-size="16" font-weight="900" fill="#071018">10</text><text x="22" y="63" font-size="16" font-weight="800" fill="#fff">Ready</text></g>
