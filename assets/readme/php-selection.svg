<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="SuperServer PHP selection screen">
  <defs><linearGradient id="w" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101426"/><stop offset="1" stop-color="#0c1020"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".55"/></filter></defs>
  <rect width="1280" height="760" fill="#070a12"/>
  <g filter="url(#s)"><rect x="60" y="44" width="1160" height="672" rx="22" fill="url(#w)" stroke="#343a55"/><path d="M60 96H1220" stroke="#343a55"/><circle cx="92" cy="70" r="7" fill="#ff5f57"/><circle cx="116" cy="70" r="7" fill="#febc2e"/><circle cx="140" cy="70" r="7" fill="#28c840"/><text x="178" y="77" font-family="Menlo,Consolas,monospace" font-size="15" fill="#96a1bd">root@server — PHP selection</text></g>
  <g font-family="Menlo,Consolas,monospace">
    <path d="M104 150H825M104 202H825" stroke="#20c9a3" stroke-width="2"/>
    <text x="126" y="183" font-size="18" font-weight="800" fill="#70eda8">Multi-PHP version selection</text>
    <text x="104" y="236" font-size="15" fill="#96a1bd">Install one or several complete PHP-FPM versions from the compatible Sury repository.</text>
    <g font-size="17">
      <rect x="104" y="270" width="30" height="30" rx="8" fill="#173036"/><text x="119" y="291" text-anchor="middle" font-weight="900" fill="#70eda8">1</text><text x="154" y="291" font-weight="800" fill="#f4f7ff">PHP 8.1</text><rect x="270" y="269" width="132" height="29" rx="15" fill="#3c2c19"/><text x="336" y="290" text-anchor="middle" font-size="12" font-weight="800" fill="#ffcb6b">LEGACY / EOL</text>
      <rect x="104" y="318" width="30" height="30" rx="8" fill="#173036"/><text x="119" y="339" text-anchor="middle" font-weight="900" fill="#70eda8">2</text><text x="154" y="339" font-weight="800" fill="#f4f7ff">PHP 8.2</text><rect x="270" y="317" width="112" height="29" rx="15" fill="#16392e"/><text x="326" y="338" text-anchor="middle" font-size="12" font-weight="800" fill="#70eda8">AVAILABLE</text>
      <rect x="104" y="366" width="30" height="30" rx="8" fill="#173036"/><text x="119" y="387" text-anchor="middle" font-weight="900" fill="#70eda8">3</text><text x="154" y="387" font-weight="800" fill="#f4f7ff">PHP 8.3</text><rect x="270" y="365" width="112" height="29" rx="15" fill="#16392e"/><text x="326" y="386" text-anchor="middle" font-size="12" font-weight="800" fill="#70eda8">AVAILABLE</text>
      <rect x="104" y="414" width="30" height="30" rx="8" fill="#173036"/><text x="119" y="435" text-anchor="middle" font-weight="900" fill="#70eda8">4</text><text x="154" y="435" font-weight="800" fill="#f4f7ff">PHP 8.4</text><rect x="270" y="413" width="112" height="29" rx="15" fill="#16392e"/><text x="326" y="434" text-anchor="middle" font-size="12" font-weight="800" fill="#70eda8">AVAILABLE</text>
      <rect x="104" y="462" width="30" height="30" rx="8" fill="#173036"/><text x="119" y="483" text-anchor="middle" font-weight="900" fill="#70eda8">5</text><text x="154" y="483" font-weight="800" fill="#f4f7ff">PHP 8.5</text><rect x="270" y="461" width="240" height="29" rx="15" fill="#16392e"/><text x="390" y="482" text-anchor="middle" font-size="12" font-weight="800" fill="#70eda8">AVAILABLE • RECOMMENDED</text>
    </g>
    <text x="104" y="538" font-size="15" fill="#96a1bd">Examples:</text><text x="190" y="538" font-size="15" fill="#4de2d1">2   |   2,3,4   |   2-5   |   all   |   all+legacy</text>
    <text x="104" y="587" font-size="17" fill="#70eda8">Versions to install [all]:</text><rect x="360" y="568" width="11" height="22" fill="#70eda8"/>
    <g>
      <rect x="104" y="625" width="230" height="66" rx="13" fill="#151b2e" stroke="#2d3854"/><text x="126" y="652" font-size="16" font-weight="800" fill="#70eda8">Essential</text><text x="126" y="676" font-size="13" fill="#96a1bd">Common web modules</text>
      <rect x="350" y="625" width="230" height="66" rx="13" fill="#151b2e" stroke="#2d3854"/><text x="372" y="652" font-size="16" font-weight="800" fill="#70eda8">All</text><text x="372" y="676" font-size="13" fill="#96a1bd">All supported modules</text>
      <rect x="596" y="625" width="230" height="66" rx="13" fill="#151b2e" stroke="#2d3854"/><text x="618" y="652" font-size="16" font-weight="800" fill="#70eda8">Custom</text><text x="618" y="676" font-size="13" fill="#96a1bd">Choose individual modules</text>
    </g>
  </g>
